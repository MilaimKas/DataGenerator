# prek — git hook configuration (https://github.com/rec/prek)
# if install, will run the  configured checks at given step

[pre-commit]
commands = [
  "ruff format --check .",
  "ruff check .",
]

[pre-push]
commands = [
  "ruff format --check .",
  "ruff check .",
  "ty check",
  "pytest --tb=short",
]
