# run  the pytest suite across multiple Python versions to ensure compatibility and correctness
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4 # clone the repository into the runner (ubuntu machine)
      - uses: astral-sh/setup-uv@v5 # install  uv  
      - run: uv sync --dev
      - run: uv run pytest --tb=short
