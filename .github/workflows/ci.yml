# Continuous Integration workflow for the DataGenerator project. 
# This workflow runs on pushes and pull requests to the main branch, performing linting, type checking, 
# and testing across multiple Python versions.

name: CI

# trigger the workflow on pushes and pull requests to the main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

